<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Facilitator Canvas</title>
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--border:#e2e8f0;--text:#1a202c;--muted:#718096;
  --blue:#1a3c5e;--blue-mid:#2563a8;--blue-light:#ebf4ff;
  --teal:#0d9488;--teal-light:#f0fdfa;--teal-dark:#0f766e;
  --amber:#b45309;--amber-bg:#fffbeb;--amber-border:#fcd34d;
  --green:#16a34a;--green-light:#f0fdf4;
  --red:#dc2626;--red-light:#fef2f2;
  --gray:#6b7280;--gray-bg:#f9fafb;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--text);background:var(--bg);min-height:100vh}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
button{font-family:inherit;font-size:inherit;cursor:pointer}

/* Layout */
.page{max-width:1500px;margin:0 auto;padding:28px 48px 80px}

/* Header */
.header{margin-bottom:16px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px}
.title-block{flex:1}
.title-input{font-size:1.5rem;font-weight:700;color:var(--blue);border:none;background:transparent;width:100%;outline:none;padding:2px 0}
.title-input:focus{border-bottom:2px solid var(--blue-mid)}
.subtitle-input{font-size:.9rem;color:var(--muted);border:none;background:transparent;width:100%;outline:none;margin-top:2px}
.subtitle-input:focus{border-bottom:1px solid var(--border)}
.save-btn{white-space:nowrap;font-size:.78rem;font-weight:600;padding:5px 14px;border-radius:99px;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .15s}
.save-btn.saved{color:var(--green);border-color:var(--green)}

.dimensions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.dim-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 20px}
.dim-label{font-size:.85rem;font-weight:700;color:var(--blue);margin-bottom:4px}
.dim-sub{font-size:.8rem;color:var(--muted)}
.dim-input{font-size:.85rem;font-weight:700;color:var(--blue);border:none;background:transparent;width:100%;outline:none}
.dim-input:focus{border-bottom:1px solid var(--blue)}
.dim-sub-input{font-size:.8rem;color:var(--muted);border:none;background:transparent;width:100%;outline:none}
.dim-sub-input:focus{border-bottom:1px solid var(--border)}

.decision-rule{background:var(--amber-bg);border:1.5px solid var(--amber-border);border-radius:var(--radius);padding:10px 16px;margin-bottom:16px;font-size:.82rem;font-weight:600;color:var(--amber)}
.dr-label{font-size:.7rem;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.dr-input{background:transparent;border:none;width:100%;outline:none;font-weight:600;color:var(--amber)}
.dr-input:focus{border-bottom:1px solid var(--amber)}

/* Tabs */
.tabs{display:flex;gap:5px;margin-bottom:26px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border-radius:99px;border:none;background:transparent;color:var(--muted);font-size:.88rem;font-weight:500;transition:all .12s;white-space:nowrap}
.tab-btn:hover{background:rgba(0,0,0,.05);color:var(--text)}
.tab-btn.active{background:var(--blue);color:#fff;font-weight:600}
.tab-btn.sub{font-size:.84rem}

/* Cards */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-size:1.05rem;font-weight:700;color:var(--blue);margin-bottom:5px}
.card-desc{font-size:.84rem;color:var(--muted);margin-bottom:16px}
.section-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:16px 0 7px}

/* Tables / lists */
.table-header{display:grid;gap:10px;padding:8px 14px;font-size:.76rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1.5px solid var(--border);margin-bottom:4px}
.list-row{display:grid;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--gray-bg);border-radius:6px}
.list-row:hover{background:var(--gray-bg)}

/* Weight buttons (1-5) */
.weight-btns{display:flex;gap:4px}
.w-btn{width:32px;height:32px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:.84rem;font-weight:600;color:var(--gray);display:flex;align-items:center;justify-content:center;transition:all .1s}
.w-btn:hover{border-color:var(--blue-mid);color:var(--blue-mid)}
.w-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* LMH buttons */
.lmh-btns{display:flex;gap:3px}
.lmh-btn{width:30px;height:30px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:.8rem;font-weight:700;color:var(--gray);display:flex;align-items:center;justify-content:center;transition:all .1s}
.lmh-btn:hover{border-color:var(--blue-mid);color:var(--blue-mid)}
.lmh-btn.on-L{background:#e8eef5;border-color:#1a3c5e;color:#1a3c5e}
.lmh-btn.on-M{background:#fff0f0;border-color:#dc2626;color:#dc2626}
.lmh-btn.on-H{background:#f0fdfa;border-color:#0d9488;color:#0d9488}

/* Input */
.input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;background:#fff;outline:none;transition:border .12s}
.input:focus{border-color:var(--blue-mid)}
.input-inline{border:none;background:transparent;outline:none;padding:0;font-weight:600}
.input-inline:focus{border-bottom:1px solid var(--blue-mid)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;border:1.5px solid transparent;font-weight:600;font-size:.8rem;transition:all .12s;text-decoration:none}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-mid)}
.btn-ghost{background:transparent;color:var(--gray);border-color:var(--border)}
.btn-ghost:hover{background:var(--gray-bg);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border-color:transparent;font-size:.75rem;padding:3px 6px}
.btn-danger:hover{background:var(--red-light)}
.btn-sm{padding:4px 10px;font-size:.75rem}
.btn-add{color:var(--blue-mid);border:1.5px dashed var(--border);background:transparent;border-radius:6px;padding:5px 12px;font-size:.78rem;font-weight:600;width:100%;margin-top:6px;transition:all .12s}
.btn-add:hover{border-color:var(--blue-mid);background:var(--blue-light)}

/* Priority btn */
.priority-btn{padding:5px 12px;border-radius:6px;font-size:.78rem;font-weight:700;border:1.5px solid var(--border);background:#fff;color:var(--gray);transition:all .12s}
.priority-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.priority-btn:hover{border-color:var(--blue)}

/* Customer chips */
.chips{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:99px;font-size:.72rem;font-weight:600;white-space:nowrap}
.chip-today{background:var(--teal-light);color:var(--teal-dark);border:1px solid #99f6e4}
.chip-opp{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.chip-del{background:none;border:none;color:inherit;cursor:pointer;font-size:.9rem;line-height:1;opacity:.6;padding:0 0 0 2px}
.chip-del:hover{opacity:1}
.chip-input{border:none;background:transparent;outline:none;font-size:.72rem;width:80px;color:var(--gray)}

/* Area group header */
.area-group-header{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:20px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--border)}

/* Category card (Tab 2) */
.cat-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow)}
.cat-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cat-name{font-size:.95rem;font-weight:700}
.cat-area-badge{font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--gray-bg);color:var(--gray);border:1px solid var(--border)}
.rating-grid{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;margin-bottom:4px}
.rating-label{font-size:.8rem;color:var(--text)}
.rating-code{font-size:.75rem;font-weight:700;color:var(--blue);margin-right:4px}
.customers-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-bg)}
.cust-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px}

/* Score output table */
.score-table{width:100%;border-collapse:collapse}
.score-table th{text-align:left;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;border-bottom:2px solid var(--border);background:var(--gray-bg)}
.score-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:.88rem}
.score-table tr:hover td{background:var(--gray-bg)}
.score-num{font-size:1.05rem;font-weight:800;color:var(--blue)}
.score-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:4px;width:70px}
.score-bar{height:4px;border-radius:2px;background:var(--green)}
.rank-num{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-size:.75rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.dash{color:var(--border);font-weight:400}

/* Deep dive notes */
.notes-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px}
.notes-area{width:100%;min-height:100px;border:1.5px solid var(--border);border-radius:6px;padding:10px 12px;font-size:.88rem;resize:vertical;outline:none;font-family:inherit}
.notes-area:focus{border-color:var(--blue-mid)}

/* Fact base layout */
.factbase-grid{display:grid;grid-template-columns:220px 1fr;gap:18px}
.area-list{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;height:fit-content}
.area-list-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:5px;cursor:pointer;font-size:.88rem}
.area-list-item:hover{background:var(--gray-bg)}
.area-list-item.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.area-name-input{flex:1;border:none;background:transparent;font-size:.88rem;font-weight:600;outline:none;cursor:pointer}
.area-name-input:focus{border-bottom:1px solid var(--blue-mid);cursor:text}

/* Scoring tab */
.score-config-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:16px}
.lmh-map-row{display:flex;align-items:center;gap:18px;margin:12px 0}
.lmh-map-label{font-size:.88rem;font-weight:600;width:18px}
.lmh-map-input{width:66px;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;text-align:center;outline:none;font-weight:700}
.lmh-map-input:focus{border-color:var(--blue-mid)}
.weight-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-bg)}
.formula-box{background:var(--gray-bg);border-radius:6px;padding:14px 16px;font-size:.84rem;color:var(--muted);line-height:1.7}
.formula-box strong{color:var(--text)}

/* Sub-segment drag rows */
.ss-drag-row{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:2px;border-radius:6px;border:1.5px solid transparent;background:#fff;transition:box-shadow .1s,border-color .1s,opacity .1s;user-select:none}
.ss-drag-row:hover{background:var(--gray-bg)}
.ss-drag-row.drag-over{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(37,99,168,.12)}
.ss-drag-row.dragging{opacity:.35}
.ss-drag-handle{color:var(--border);font-size:1.2rem;cursor:grab;flex-shrink:0;padding:0 2px}
.ss-drag-handle:hover{color:var(--gray)}
.ss-drag-row:active .ss-drag-handle{cursor:grabbing}

/* Misc */
.flex{display:flex}.gap-8{gap:8px}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-1{flex:1}
.muted{color:var(--muted)}.small{font-size:.84rem}
.mt-2{margin-top:8px}.mt-4{margin-top:16px}.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}
.hidden{display:none!important}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}

@media print{
  .tabs,.save-btn,.btn-add,.btn-danger,.btn-ghost,.priority-btn,.chip-del,.chip-input{display:none!important}
  .page{padding:0}
  .card,.cat-card,.notes-card{box-shadow:none;break-inside:avoid}
}

/* ── Poll styles ─────────────────────────────────────────────── */
.poll-banner{background:var(--blue);color:#fff;border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.poll-banner-title{font-weight:700;font-size:.9rem;white-space:nowrap}
.poll-banner input{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:6px;color:#fff;padding:5px 10px;font-size:.78rem;flex:1;min-width:160px;outline:none}
.poll-banner input::selection{background:rgba(255,255,255,.4)}
.poll-banner .btn-poll-copy{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);color:#fff;border-radius:6px;padding:5px 12px;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .12s}
.poll-banner .btn-poll-copy:hover{background:rgba(255,255,255,.28)}
.poll-banner .btn-poll-close{background:rgba(220,38,38,.7);border:none;color:#fff;border-radius:6px;padding:5px 12px;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .12s;margin-left:auto}
.poll-banner .btn-poll-close:hover{background:rgba(220,38,38,.9)}
.poll-closed-banner{background:#f9fafb;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin-bottom:18px;font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:10px}
.vote-bar-wrap{display:inline-flex;align-items:center;gap:6px;margin-left:8px;flex-shrink:0}
.vote-bar-track{width:80px;height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.vote-bar-fill{height:100%;background:var(--blue);border-radius:99px;transition:width .4s ease}
.vote-bar-label{font-size:.68rem;font-weight:700;color:var(--blue);min-width:18px;text-align:right}

/* ── Participant screen ───────────────────────────────────────── */
#participant-screen{display:none;min-height:100vh;background:var(--bg);padding:32px 20px 80px}
.participant-wrap{max-width:680px;margin:0 auto}
.participant-title{font-size:1.4rem;font-weight:800;color:var(--blue);margin-bottom:6px}
.participant-sub{font-size:.9rem;color:var(--muted);margin-bottom:24px}
.participant-seg-header{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--red);margin:20px 0 8px;padding-bottom:6px;border-bottom:3px solid var(--red)}
.participant-ss-card{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;border:1.5px solid var(--border);background:#fff;margin-bottom:5px;cursor:pointer;transition:border-color .12s,background .12s;user-select:none}
.participant-ss-card:hover{border-color:var(--blue-mid);background:var(--blue-light)}
.participant-ss-card.selected{border-color:var(--blue);background:var(--blue);color:#fff}
.participant-ss-card.selected .participant-ss-name{color:#fff}
.participant-ss-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .12s}
.participant-ss-card.selected .participant-ss-check{background:#fff;border-color:#fff;color:var(--blue)}
.participant-ss-name{font-size:.88rem;font-weight:500;flex:1}
.participant-counter{font-size:.9rem;font-weight:700;color:var(--blue);margin:18px 0 10px}
.participant-submit{width:100%;padding:12px;border-radius:8px;background:var(--blue);color:#fff;border:none;font-size:1rem;font-weight:700;cursor:pointer;transition:background .12s;margin-top:8px}
.participant-submit:hover:not(:disabled){background:var(--blue-mid)}
.participant-submit:disabled{opacity:.45;cursor:default}
.participant-thankyou{text-align:center;padding:48px 20px}
.participant-thankyou-icon{font-size:3rem;margin-bottom:12px}
.participant-thankyou-title{font-size:1.3rem;font-weight:800;color:var(--blue);margin-bottom:6px}
.participant-thankyou-sub{color:var(--muted);font-size:.9rem}
.participant-closed{text-align:center;padding:64px 20px;color:var(--muted);font-size:1rem}
.participant-loading{text-align:center;padding:64px 20px;color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<div id="participant-screen"></div>
<div class="page">
  <div class="header">
    <div class="header-top">
      <div class="title-block">
        <input class="title-input" id="meta-title" value="" oninput="S.meta.title=this.value;save()">
        <input class="subtitle-input" id="meta-subtitle" value="" placeholder="Workshop · location · format" oninput="S.meta.subtitle=this.value;save()">
      </div>
      <button class="save-btn" id="save-btn" onclick="save(true)">Save ✓</button>
    </div>
  </div>
  <div class="tabs" id="tabs-render"></div>
  <div id="content"></div>
</div>

<script>
// ── Utilities ──────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return '_'+Math.random().toString(36).slice(2,9)+'_'+Date.now().toString(36);}
function $(sel,ctx){return(ctx||document).querySelector(sel);}

// ── Default state ─────────────────────────────────────────────
const TABS=[
  {id:'1',label:'1  Sub-segments'},
  {id:'1.1',label:'1.1  Selection attr.',sub:true},
  {id:'2',label:'2  Rating / sub-segment'},
  {id:'2.1',label:'2.1  Scoring',sub:true},
  {id:'3',label:'3  Score output'},
  {id:'4',label:'4  Deep-dives'},
];

function newSubsegment(name){
  return{id:uid(),name:name||'',highlighted:false,leverRatings:{},attrRatings:{},capAttrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''};
}

function defaultState(){
  return {
    meta:{
      title:'WS1 · Facilitator Canvas',
      subtitle:'Workshop · full day',
      decisionRule:'Decision rule: leave with 5±2 sub-segments — each with ≥1 right-to-win and ≥1 priority customer.',
      dimensions:[
        {label:'1 · sub-segments',sub:'segment level'},
        {label:'2 · customers / area',sub:'today + envisioned'},
        {label:'3 · right-to-win',sub:'core capability, ideally high margin'},
      ],
    },
    levers:[
      {id:uid(),code:'A',name:'Example lever',weight:3},
    ],
    attributes:[
      {id:uid(),name:'Example attribute',weight:3},
    ],
    segments:[
      {id:'seg_bio',name:'Biometric sensing',subsegments:[
        {id:'ss1',        name:'Fitness trackers, Smartwatch & sports/GPS watch',          highlighted:true, leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss3',        name:'Other health tracking devices: rings, earbuds, glasses',    highlighted:true, leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio3',    name:"Women's health & fertility devices",                        highlighted:false,leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio4',    name:'CGM sensors & applicators',                                 highlighted:true, leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio5',    name:'Ambulatory cardiac monitoring patches',                     highlighted:false,leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio6',    name:'Food content / allergen detection devices',                 highlighted:true, leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio7',    name:'BP monitors, thermometers, pulse oximeters, GCM',          highlighted:true, leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio8',    name:'Telecare & aging-in-place',                                 highlighted:true, leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio9',    name:'Telehealth exam kits',                                      highlighted:true, leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio10',   name:'Home health measurement devices',                           highlighted:true, leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio11',   name:'Fall detection & elderly monitoring',                       highlighted:false,leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
        {id:'ss_bio12',   name:'Non-wearable sleep monitoring',                             highlighted:true, leverRatings:{},attrRatings:{},customersToday:[],customersOpp:[],priority:false,notes:''},
      ]},

// ── State ─────────────────────────────────────────────────────
let S=defaultState();
let _saveTimer=null;

function load(){
  try{
    const raw=localStorage.getItem('facilitator-canvas-v2');
    if(raw){const parsed=JSON.parse(raw);S=Object.assign(defaultState(),parsed);}
  }catch(e){}
}
function save(manual){
  localStorage.setItem('facilitator-canvas-v2',JSON.stringify(S));
  const btn=$('#save-btn');if(btn){btn.textContent='Saved ✓';btn.classList.add('saved');}
  if(!manual){
    clearTimeout(_saveTimer);
    _saveTimer=setTimeout(()=>{if(btn){btn.textContent='Saved ✓';btn.classList.add('saved');}},1500);
  }
}

// ── Scoring ───────────────────────────────────────────────────
function computeScore(cat){
  const sc=S.scoring;
  const maxLmh=Math.max(sc.L||1,sc.M||2,sc.H||3);
  const lmhVal=v=>sc[v]||0;

  const ratedLevers=S.levers.filter(l=>l.weight>0&&cat.leverRatings[l.id]);
  let leverSub=null;
  if(ratedLevers.length>0){
    const sum=ratedLevers.reduce((a,l)=>a+l.weight*lmhVal(cat.leverRatings[l.id]),0);
    leverSub=Math.round((sum/ratedLevers.length)/(5*maxLmh)*100);
  }

  const ratedAttrs=S.attributes.filter(a=>a.weight>0&&cat.attrRatings[a.id]);
  let attrSub=null;
  if(ratedAttrs.length>0){
    const sum=ratedAttrs.reduce((a,attr)=>a+attr.weight*lmhVal(cat.attrRatings[attr.id]),0);
    attrSub=Math.round((sum/ratedAttrs.length)/(5*maxLmh)*100);
  }

  const ratedCapAttrs=(S.capAttributes||[]).filter(a=>a.weight>0&&cat.capAttrRatings&&cat.capAttrRatings[a.id]);
  let capAttrSub=null;
  if(ratedCapAttrs.length>0){
    const sum=ratedCapAttrs.reduce((a,attr)=>a+attr.weight*lmhVal(cat.capAttrRatings[attr.id]),0);
    capAttrSub=Math.round((sum/ratedCapAttrs.length)/(5*maxLmh)*100);
  }

  if(leverSub===null&&attrSub===null&&capAttrSub===null)return{total:null,lever:null,attr:null,capAttr:null};
  const lw=sc.leverGroupWeight||5,aw=sc.attrGroupWeight||5,cw=sc.capAttrGroupWeight||5;
  const subs=[{w:lw,v:leverSub},{w:aw,v:attrSub},{w:cw,v:capAttrSub}].filter(x=>x.v!==null);
  const total=Math.round(subs.reduce((a,x)=>a+x.w*x.v,0)/subs.reduce((a,x)=>a+x.w,0));
  return{total,lever:leverSub,attr:attrSub,capAttr:capAttrSub};
}

              const avg=((counts.L||0)*1+(counts.M||0)*2+(counts.H||0)*3)/total;

// ── Tab 3: Score output ───────────────────────────────────────
function renderTab3(){
  const included=[];
  const excluded=[];
  S.segments.forEach(seg=>{
    seg.subsegments.forEach(ss=>{
      (ss.priority?included:excluded).push({seg:seg.name,ss,score:computeScore(ss)});
    });
  });
  included.sort((a,b)=>(b.score.total??-1)-(a.score.total??-1));
  const maxScore=included.reduce((m,r)=>Math.max(m,r.score.total??0),0)||1;

  function makeRow(r,i,dimmed){
    const sc=r.score;
    const scoreCell=!dimmed&&sc.total!==null
      ?`<div class="score-num">${sc.total}</div><div class="score-bar-wrap"><div class="score-bar" style="width:${Math.round(sc.total/maxScore*100)}%"></div></div>`
      :`<span class="dash">—</span>`;
    const intBadge=r.ss.highlighted?`<span style="font-size:.68rem;font-weight:700;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);border-radius:99px;padding:1px 6px">★ interviews</span> `:'';
    const rowStyle=dimmed?'opacity:.45;':'';
    const rankCell=dimmed?`<span style="color:#d1d5db;font-size:.8rem">—</span>`:`<span class="rank-num">${i+1}</span>`;
    return`<tr style="${rowStyle}">
      <td>${rankCell}</td>
      <td class="muted">${esc(r.seg)}</td>
      <td style="font-weight:600">${intBadge}${esc(r.ss.name)}</td>
      <td style="color:#1a3c5e;font-weight:600">${!dimmed&&sc.lever!==null?sc.lever:`<span class="dash">—</span>`}</td>
      <td style="color:#dc2626;font-weight:600">${!dimmed&&sc.attr!==null?sc.attr:`<span class="dash">—</span>`}</td>
      <td style="color:#0d9488;font-weight:600">${!dimmed&&sc.capAttr!==null?sc.capAttr:`<span class="dash">—</span>`}</td>
      <td>${scoreCell}</td>
      <td>
        <button class="priority-btn${r.ss.priority?' on':''}" onclick="togglePriorityById('${r.ss.id}')">
          ${r.ss.priority?'✓ Included':'Include'}
        </button>
      </td>
    </tr>`;
  }

  const includedRows=included.map((r,i)=>makeRow(r,i,false)).join('');
  const excludedRows=excluded.length>0
    ?`<tr><td colspan="8" style="padding:20px 12px 8px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#d1d5db;border-top:2px dashed #e5e7eb">Not included in assessment</td></tr>`
     +excluded.map(r=>makeRow(r,0,true)).join('')
    :'';

  return`
    <div class="card" style="margin-bottom:18px">
      <div class="card-title">Score output — ranked sub-segments</div>
      <div class="card-desc">Included sub-segments ranked by score. Sub-segments not marked as included are shown below for reference.</div>
    </div>
    <div style="overflow-x:auto">
      <table class="score-table">
        <thead><tr>
          <th>#</th><th>Segment</th><th>Sub-segment</th>
          <th style="color:#1a3c5e">Market</th><th style="color:#dc2626">Product</th><th style="color:#0d9488">Capability</th><th>Score</th><th>Included</th>
        </tr></thead>
        <tbody>${includedRows+excludedRows||'<tr><td colspan="8" class="muted" style="text-align:center;padding:24px">No sub-segments yet — add them in the Sub-segments tab.</td></tr>'}</tbody>
      </table>
    </div>`;
}

// ── Drag-and-drop for sub-segments ────────────────────────────
let _ssDrag={si:null,ssi:null};
function ssDragStart(e,si,ssi){
  _ssDrag={si,ssi};
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function ssDragOver(e,si,ssi){
  if(_ssDrag.si!==si)return; // only within same segment
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.ss-drag-row').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function ssDrop(e,si,ssi){
  e.preventDefault();
  if(_ssDrag.si!==si||_ssDrag.ssi===ssi)return;
  const arr=S.segments[si].subsegments;
  const [moved]=arr.splice(_ssDrag.ssi,1);
  arr.splice(ssi,0,moved);
  save();render();
}
function ssDragEnd(){
  _ssDrag={si:null,ssi:null};
  document.querySelectorAll('.ss-drag-row').forEach(el=>el.classList.remove('dragging','drag-over'));
}

S.pollBinId   = S.pollBinId   || null;

// ── Master key helpers (stored in localStorage, never in S/cloud) ─
function getMasterKey(){ return localStorage.getItem('poll-masterkey')||''; }
function saveMasterKey(val){ if(val)localStorage.setItem('poll-masterkey',val); }
function promptForMasterKey(){
  const k=prompt('Enter your jsonbin.io Master Key (get a free one at jsonbin.io → Dashboard → API Keys):');
  if(k&&k.trim()){saveMasterKey(k.trim());return k.trim();}
  return null;
}

function buildPollSubsegments(){
  const list=[];
  S.segments.forEach(seg=>seg.subsegments.forEach(ss=>{
    list.push({id:ss.id,name:ss.name,segId:seg.id,segName:seg.name});
  }));
  return list;
}

function resetPoll(){
  if(!confirm('Reset all poll data? This clears votes, bin ID, and vote counts. Cannot be undone.'))return;
  clearInterval(_pollTimer);_pollTimer=null;
  S.pollBinId=null;S.pollAccessKey=null;S.pollActive=false;S.pollClosed=false;S.pollVotes={};S.pollVoterCount=0;
  save();render();
}

function buildAttrPollAttrs(){
  const attrs=[];
  (S.levers||[]).forEach(a=>attrs.push({id:a.id,name:a.name,group:'Market attributes'}));
  (S.attributes||[]).forEach(a=>attrs.push({id:a.id,name:a.name,group:'Product attributes'}));
  (S.capAttributes||[]).forEach(a=>attrs.push({id:a.id,name:a.name,group:'Capability attributes'}));
  return attrs;
}

function buildRatingPollData(){
  const subs=[];
  S.segments.forEach(seg=>seg.subsegments.forEach(ss=>{
    if(ss.priority)subs.push({id:ss.id,name:ss.name,segName:seg.name});
  }));
  const attrs=[]
    .concat((S.levers||[]).map(a=>({id:a.id,name:a.name,pool:'lever',group:'Market attributes'})))
    .concat((S.attributes||[]).map(a=>({id:a.id,name:a.name,pool:'attr',group:'Product attributes'})))
    .concat((S.capAttributes||[]).map(a=>({id:a.id,name:a.name,pool:'cap',group:'Capability attributes'})));
  return {subs,attrs};
}

async function startAttrPoll(){
  let mk=getMasterKey();
  if(!mk){mk=prompt('Enter master key to create attribute poll bin:');if(!mk)return;saveMasterKey(mk);}
  const attrs=buildAttrPollAttrs();
  const binData={pollType:'attr',open:true,attributes:attrs,votes:{}};
  try{
    const cr=await fetch(`${JSONBIN}/b`,{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':mk,'X-Bin-Private':'false'},body:JSON.stringify(binData)});
    const cj=await cr.json();
    if(!cj.metadata||!cj.metadata.id)throw new Error('Bin creation failed');
    const binId=cj.metadata.id;
    let accessKey=mk;
    try{
      const akr=await fetch(`${JSONBIN}/v3/a`,{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':mk},body:JSON.stringify({name:'AttrPollKey-'+binId,permissions:[{_id:binId,read:true,create:false,update:true,delete:false}]})});
      const akj=await akr.json();
      if(akj.record&&akj.record.secretKey)accessKey=akj.record.secretKey;
    }catch(e){}
    S.pollAttrBinId=binId;S.pollAttrAccessKey=accessKey;S.pollAttrActive=true;S.pollAttrClosed=false;S.pollAttrVotes={};S.pollAttrVoterCount=0;

async function syncAttrPollVotes(){
  if(!S.pollAttrBinId)return;
  const ak=S.pollAttrAccessKey;const mk=getMasterKey();
  const isMaster=ak&&ak.startsWith('$2a$');
  const headers={};
  if(isMaster)headers['X-Master-Key']=ak;else{if(mk)headers['X-Master-Key']=mk;if(ak)headers['X-Access-Key']=ak;}
  try{
    const r=await fetch(`${JSONBIN}/b/${S.pollAttrBinId}/latest`,{headers});
    const j=await r.json();const rec=j.record||{};
    const rawVotes=rec.votes||{};
    const totals={};const counts={};
    Object.values(rawVotes).forEach(vobj=>{
      Object.entries(vobj).forEach(([aid,score])=>{
        if(!totals[aid]){totals[aid]=0;counts[aid]=0;}
        totals[aid]+=Number(score);counts[aid]++;
      });
    });
    const avgs={};
    Object.keys(totals).forEach(aid=>{avgs[aid]=Math.round(totals[aid]/counts[aid]*10)/10;});
    S.pollAttrVotes=avgs;S.pollAttrVoterCount=Object.keys(rawVotes).length;
    save();
    if(S.tab==='1.1'){const c=$('#content');if(c)c.innerHTML=renderTab11();}
  }catch(e){}
}

async function syncRatingPollVotes(){

  const headers={};

        if(!agg[key])agg[key]={L:0,M:0,H:0};
        if(val==='L'||val==='M'||val==='H')agg[key][val]++;
      });
    });
    S.pollRatingVotes=agg;S.pollRatingVoterCount=Object.keys(rawVotes).length;

async function startPoll(){
  let mk=getMasterKey();
  if(!mk){mk=promptForMasterKey();if(!mk)return;}
  const subsegments=buildPollSubsegments();
  const record={open:true,subsegments,votes:{}};
  try{
    // 1. Create bin
    const res=await fetch(`${JSONBIN}/b`,{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Master-Key':mk,'X-Bin-Private':'false'},
      body:JSON.stringify(record)
    });
    const data=await res.json();
    const binId=data.metadata&&data.metadata.id;
    if(!binId){alert('Failed to create poll bin. Check your Master Key and network.');return;}

    // 2. Create a limited access key for participants (READ + UPDATE only)
    let accessKey=mk; // fallback: use master key if access key creation fails
    try{
      const akRes=await fetch(`${JSONBIN}/v3/a`,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Master-Key':mk},
        body:JSON.stringify({name:'Poll participants',permissions:['READ','UPDATE'],bins:[binId]})
      });
      if(akRes.ok){const akData=await akRes.json();accessKey=akData.result?.accessKey||akData.accessKey||mk;}
    }catch(e){/* use master key as fallback */}

    S.pollBinId=binId;
    S.pollAccessKey=accessKey;
    S.pollActive=true;
    S.pollClosed=false;
    S.pollVotes={};
    save();
    render();
    _pollTimer=setInterval(syncPollVotes,3000);
  }catch(e){
    alert('Error starting poll: '+e.message);
  }
}

async function syncPollVotes(){
  if(!S.pollBinId)return;
  const mk=getMasterKey();
  try{
    const res=await fetch(`${JSONBIN}/b/${S.pollBinId}/latest`,{headers:mk?{'X-Master-Key':mk}:{}});
    const data=await res.json();
    const counts={};
    let voterCount=0;
    Object.values(data.record?.votes||{}).forEach(picks=>{
      voterCount++;
      (picks||[]).forEach(id=>{counts[id]=(counts[id]||0)+1;});
    });
    S.pollVotes=counts;
    S.pollVoterCount=voterCount;
    updateVoteBadges();
  }catch(e){}
}

function updateVoteBadges(){
  document.querySelectorAll('[data-vote-badge]').forEach(el=>{
    const n=S.pollVotes[el.getAttribute('data-vote-badge')]||0;
    el.textContent=n+(n===1?' vote':' votes');
  });
  const vc=document.getElementById('poll-voter-count');
  if(vc)vc.textContent=(S.pollVoterCount||0)+' voter'+(S.pollVoterCount===1?'':'s');
}

    const rec=(await res.json()).record||{};
    rec.open=true;
    await fetch(`${JSONBIN}/b/${S.pollBinId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':mk},body:JSON.stringify(rec)});
  }catch(e){alert('Error reopening poll: '+e.message);return;}
  S.pollActive=true;S.pollClosed=false;
  save();render();
  _pollTimer=setInterval(syncPollVotes,3000);
}

    const btn=document.getElementById('poll-copy-btn');
    if(btn){btn.textContent='Copied!';setTimeout(()=>{btn.textContent='Copy link';},2000);}
  });
}

// ── Participant screen ────────────────────────────────────────
const _voterId='voter_'+Math.random().toString(36).slice(2,8);

async function initParticipantScreen(binId,accessKey){
  const screen=document.getElementById('participant-screen');
  const page=document.querySelector('.page');
  screen.style.display='block';
  if(page)page.style.display='none';
  screen.innerHTML=`<div class="participant-wrap"><p class="participant-loading">Loading poll…</p></div>`;

  let record;
  try{
    const headers=accessKey?{'X-Access-Key':accessKey}:{};
    const res=await fetch(`${JSONBIN}/b/${binId}/latest`,{headers});
    record=(await res.json()).record;
  }catch(e){
    screen.innerHTML=`<div class="participant-wrap"><div class="participant-closed">Could not load poll. Check the link and try again.</div></div>`;
    return;
  }

  if(!record||!record.open){
    screen.innerHTML=`<div class="participant-wrap"><div class="participant-closed">
      <div style="font-size:2.5rem;margin-bottom:12px">🔒</div>
      <div style="font-weight:700;color:var(--blue);font-size:1.1rem;margin-bottom:6px">This poll is closed</div>
      <div>The facilitator has ended the voting session.</div>
    </div></div>`;
    return;
  }

  // Store binId and accessKey for participant submit functions
  window._pollBinId=binId;
  window._pollAccessKey=accessKey;

  const pollType=record.pollType||'ss';
  if(pollType==='attr'){
    renderAttrParticipantUI(record);
    return;
  } else if(pollType==='rating'){
    renderRatingParticipantUI(record);
    return;
  }

  // existing ss UI
  const subsegments=record.subsegments||[];
  const segMap={};
  subsegments.forEach(ss=>{
    if(!segMap[ss.segId])segMap[ss.segId]={name:ss.segName,items:[]};
    segMap[ss.segId].items.push(ss);
  });

  const selected=new Set();
  const MAX=7;

  function renderParticipant(){
    const segHtml=Object.values(segMap).map(seg=>`
      <div class="participant-seg-header">${esc(seg.name)}</div>
      ${seg.items.map(ss=>{
        const on=selected.has(ss.id);
        return`<div class="participant-ss-card${on?' selected':''}" onclick="participantToggle('${ss.id}')">
          <div class="participant-ss-check">${on?'✓':''}</div>
          <span class="participant-ss-name">${esc(ss.name)}</span>
        </div>`;
      }).join('')}`).join('');
    const n=selected.size;
    screen.innerHTML=`<div class="participant-wrap">
      <div class="participant-title">Sub-segment vote</div>
      <div class="participant-sub">Select up to ${MAX} sub-segments you think are most relevant</div>
      ${segHtml}
      <div class="participant-counter">${n} / ${MAX} selected</div>
      <button class="participant-submit" id="psub" ${n>=1&&n<=MAX?'':'disabled'} onclick="submitVote()">Submit vote</button>
    </div>`;
  }

  window.participantToggle=function(ssId){
    if(selected.has(ssId))selected.delete(ssId);
    else if(selected.size<MAX)selected.add(ssId);
    renderParticipant();
  };

  window.submitVote=async function(){
    const btn=document.getElementById('psub');
    if(btn){btn.disabled=true;btn.textContent='Submitting…';}
    const picks=Array.from(selected);
    // master keys start with $2a$; access keys do not — use the right header
    const isMaster=accessKey&&accessKey.startsWith('$2a$');
    const authHeader=accessKey?(isMaster?{'X-Master-Key':accessKey}:{'X-Access-Key':accessKey}):{};
    const headers={'Content-Type':'application/json',...authHeader};
    try{
      const res=await fetch(`${JSONBIN}/b/${binId}/latest`,{headers:authHeader});
      const rec=(await res.json()).record||{};
      if(!rec.votes)rec.votes={};
      rec.votes[_voterId]=picks;
      await fetch(`${JSONBIN}/b/${binId}`,{method:'PUT',headers,body:JSON.stringify(rec)});
      screen.innerHTML=`<div class="participant-wrap"><div class="participant-thankyou">
        <div class="participant-thankyou-icon">✅</div>
        <div class="participant-thankyou-title">Thank you!</div>
        <div class="participant-thankyou-sub">Your vote has been recorded. The facilitator will share the results.</div>
      </div></div>`;
    }catch(e){
      if(btn){btn.disabled=false;btn.textContent='Submit vote';}
      alert('Error submitting: '+e.message);
    }
  };

  renderParticipant();
}

function renderAttrParticipantUI(record){
  const container=document.getElementById('participant-screen');
  const attrs=record.attributes||[];
  const groups=['Market attributes','Product attributes','Capability attributes'];
  const groupColors={'Market attributes':'#1a3c5e','Product attributes':'#dc2626','Capability attributes':'#0d9488'};
  let html=`<div class="participant-wrap"><h2 style="margin-bottom:4px">Attribute importance</h2>
    <p style="color:#6b7280;margin-bottom:20px">Rate each attribute from 1 (nice to have) to 5 (must-have)</p>`;
  groups.forEach(g=>{
    const ga=attrs.filter(a=>a.group===g);
    if(!ga.length)return;
    html+=`<div style="margin-bottom:16px"><div style="font-weight:700;color:${groupColors[g]};margin-bottom:8px">${g}</div>`;
    ga.forEach(a=>{
      html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0" id="attr-row-${a.id}">
        <span>${esc(a.name)}</span>
        <div style="display:flex;gap:6px">`;
      for(let i=1;i<=5;i++){
        html+=`<button onclick="attrParticipantRate('${a.id}',${i})" id="attrBtn-${a.id}-${i}" style="width:32px;height:32px;border-radius:50%;border:2px solid #d1d5db;background:#fff;cursor:pointer;font-weight:600">${i}</button>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div>`;
  });
  html+=`<button id="attrSubmitBtn" onclick="submitAttrVote()" disabled style="margin-top:16px;background:#1a3c5e;color:#fff;border:none;padding:10px 28px;border-radius:6px;cursor:pointer;font-size:15px;opacity:0.5">Submit</button></div>`;
  container.innerHTML=html;
  window._attrPollRecord=record;
  window._attrRatings={};
}

window.attrParticipantRate=function(attrId,score){
  if(!window._attrRatings)window._attrRatings={};
  window._attrRatings[attrId]=score;
  const record=window._attrPollRecord;
  const attrs=record.attributes||[];
  attrs.forEach(a=>{
    for(let i=1;i<=5;i++){
      const btn=document.getElementById('attrBtn-'+a.id+'-'+i);
      if(btn){btn.style.background=(window._attrRatings[a.id]===i)?'#1a3c5e':'#fff';btn.style.color=(window._attrRatings[a.id]===i)?'#fff':'#000';}
    }
  });
  const allRated=attrs.every(a=>window._attrRatings[a.id]!==undefined);
  const btn=document.getElementById('attrSubmitBtn');
  if(btn){btn.disabled=!allRated;btn.style.opacity=allRated?'1':'0.5';}
};

window.submitAttrVote=async function(){
  const record=window._attrPollRecord;
  const ak=window._pollAccessKey;
  const isMaster=ak&&ak.startsWith('$2a$');
  const headers={'Content-Type':'application/json'};
  if(isMaster)headers['X-Master-Key']=ak;else headers['X-Access-Key']=ak;
  const binId=window._pollBinId;
  try{
    const r=await fetch(`${JSONBIN}/b/${binId}/latest`,{headers:{...(isMaster?{'X-Master-Key':ak}:{'X-Access-Key':ak})}});
    const j=await r.json();const rec=j.record||{};
    if(!rec.votes)rec.votes={};
    rec.votes[_voterId]=window._attrRatings;
    await fetch(`${JSONBIN}/b/${binId}`,{method:'PUT',headers,body:JSON.stringify(rec)});
    document.getElementById('participant-screen').innerHTML='<div class="participant-wrap"><div style="text-align:center;padding:40px;color:#059669;font-size:18px;font-weight:600">Thank you! Your ratings have been submitted.</div></div>';
  }catch(e){alert('Submit failed: '+e.message);}
};

function renderRatingParticipantUI(record){
  const container=document.getElementById('participant-screen');
  const subs=record.subsegments||[];
  const attrs=record.attributes||[];
  let html=`<div class="participant-wrap"><h2 style="margin-bottom:4px">Sub-segment rating</h2>
    <p style="color:#6b7280;margin-bottom:20px">Rate each sub-segment against each attribute</p>`;
  subs.forEach(ss=>{
    html+=`<div style="margin-bottom:20px">
      <div style="font-weight:700;color:#1a3c5e;margin-bottom:8px;font-size:15px">${esc(ss.name)}${ss.segName?' <span style="font-weight:400;color:#6b7280;font-size:13px">('+esc(ss.segName)+')</span>':''}</div>`;
    attrs.forEach(a=>{
      html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0">
        <span style="font-size:13px;color:#374151">${esc(a.name)}</span>
        <div style="display:flex;gap:6px">
          ${['L','M','H'].map(v=>`<button onclick="ratingParticipantRate('${ss.id}','${a.id}','${v}')" id="ratingBtn-${ss.id}-${a.id}-${v}" style="padding:4px 12px;border-radius:4px;border:2px solid #d1d5db;background:#fff;cursor:pointer;font-weight:600;font-size:13px">${v}</button>`).join('')}
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`<button onclick="submitRatingVote()" style="margin-top:16px;background:#1a3c5e;color:#fff;border:none;padding:10px 28px;border-radius:6px;cursor:pointer;font-size:15px">Submit</button></div>`;
  container.innerHTML=html;
  window._ratingPollRecord=record;
  window._ratingChoices={};
}

window.ratingParticipantRate=function(ssId,attrId,val){
  const key=ssId+'|'+attrId;
  if(!window._ratingChoices)window._ratingChoices={};
  window._ratingChoices[key]=val;
  ['L','M','H'].forEach(v=>{
    const btn=document.getElementById('ratingBtn-'+ssId+'-'+attrId+'-'+v);
    if(btn){btn.style.background=v===val?'#1a3c5e':'#fff';btn.style.color=v===val?'#fff':'#000';}
  });
};

window.submitRatingVote=async function(){
  const ak=window._pollAccessKey;
  const isMaster=ak&&ak.startsWith('$2a$');
  const headers={'Content-Type':'application/json'};
  if(isMaster)headers['X-Master-Key']=ak;else headers['X-Access-Key']=ak;
  const binId=window._pollBinId;
  try{
    const r=await fetch(`${JSONBIN}/b/${binId}/latest`,{headers:{...(isMaster?{'X-Master-Key':ak}:{'X-Access-Key':ak})}});
    const j=await r.json();const rec=j.record||{};
    if(!rec.votes)rec.votes={};
    rec.votes[_voterId]=window._ratingChoices||{};
    await fetch(`${JSONBIN}/b/${binId}`,{method:'PUT',headers,body:JSON.stringify(rec)});
    document.getElementById('participant-screen').innerHTML='<div class="participant-wrap"><div style="text-align:center;padding:40px;color:#059669;font-size:18px;font-weight:600">Thank you! Your ratings have been submitted.</div></div>';
  }catch(e){alert('Submit failed: '+e.message);}
};

// ── Init ──────────────────────────────────────────────────────
load();

// Migrate old state shape (areas→segments) if needed
if(S.areas&&!S.segments){
  S.segments=S.areas.map(a=>({id:a.id,name:a.name,subsegments:(a.categories||[]).map(c=>Object.assign(newSubsegment(c.name),c,{highlighted:c.highlighted||false}))}));
  delete S.areas;
}
if(!S.segments)S.segments=defaultState().segments;

if(!S.capAttributes)S.capAttributes=[];
if(!S.scoring.capAttrGroupWeight)S.scoring.capAttrGroupWeight=5;

// Ensure poll fields exist after load
if(!S.pollBinId)S.pollBinId=null;
if(!S.pollActive)S.pollActive=false;
if(!S.pollVotes)S.pollVotes={};
if(!S.pollClosed)S.pollClosed=false;
if(!S.pollAttrBinId)S.pollAttrBinId=null;
if(!S.pollAttrAccessKey)S.pollAttrAccessKey=null;
if(!S.pollAttrActive)S.pollAttrActive=false;
if(!S.pollAttrClosed)S.pollAttrClosed=false;
if(!S.pollAttrVotes)S.pollAttrVotes={};
if(!S.pollAttrVoterCount)S.pollAttrVoterCount=0;
if(!S.pollRatingBinId)S.pollRatingBinId=null;
if(!S.pollRatingAccessKey)S.pollRatingAccessKey=null;
if(!S.pollRatingActive)S.pollRatingActive=false;
if(!S.pollRatingClosed)S.pollRatingClosed=false;
if(!S.pollRatingVotes)S.pollRatingVotes={};
if(!S.pollRatingVoterCount)S.pollRatingVoterCount=0;

// Clean up any stale null strings in ratings
S.segments.forEach(sg=>sg.subsegments.forEach(ss=>{
  if(!ss.capAttrRatings)ss.capAttrRatings={};
  Object.keys(ss.leverRatings||{}).forEach(k=>{if(!ss.leverRatings[k])delete ss.leverRatings[k];});
  Object.keys(ss.attrRatings||{}).forEach(k=>{if(!ss.attrRatings[k])delete ss.attrRatings[k];});
  Object.keys(ss.capAttrRatings||{}).forEach(k=>{if(!ss.capAttrRatings[k])delete ss.capAttrRatings[k];});
}));

// Check for participant mode via URL hash
(function(){
  const hash = window.location.hash;
  const match = hash.match(/^#poll=(.+)$/);
  if(match){
    const parts = match[1].trim().split('|');
    const binId = parts[0];
    const accessKey = parts[1]||'';
    initParticipantScreen(binId, accessKey);
    return;
  }

  // Resume polling if it was active before page reload
  if(S.pollActive && S.pollBinId){
    _pollTimer = setInterval(syncPollVotes, 3000);
  }
  if(S.pollAttrActive && S.pollAttrBinId) _pollAttrTimer = setInterval(syncAttrPollVotes, 3000);
  if(S.pollRatingActive && S.pollRatingBinId) _pollRatingTimer = setInterval(syncRatingPollVotes, 3000);

  render();
})();
</script>
